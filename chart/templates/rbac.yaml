{{- if .Values.rbac.create -}}
{{- if .Values.rbac.clusterWide -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kctx.fullname" . }}
  labels:
    {{- include "kctx.labels" . | nindent 4 }}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kctx.fullname" . }}
  labels:
    {{- include "kctx.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kctx.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kctx.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kctx.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kctx.labels" . | nindent 4 }}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kctx.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kctx.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kctx.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kctx.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
