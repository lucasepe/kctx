name: Cross-Platform Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  PROJECT_NAME: kctx
  RELEASE: v0.0.0
  DIST_DIR: dist
  EXTRA_FILES: "README.md"
  UPX_ARGS: "--best --lzma"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive_ext: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true
          cache-dependency-path: go.sum

      - name: Install UPX
        run: sudo apt-get install -y upx

      - name: Determine version and commit
        id: vars
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "${{ env.RELEASE }}")
          COMMIT=$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "COMMIT=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          set -euo pipefail

          mkdir -p "${{ env.DIST_DIR }}"

          VERSION="${{ steps.vars.outputs.VERSION }}"
          VERSION="${VERSION#v}"
          OUTPUT_DIR="${{ env.DIST_DIR }}/${{ env.PROJECT_NAME }}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          OUTPUT_FILE="${OUTPUT_DIR}/${{ env.PROJECT_NAME }}${{ matrix.ext }}"

          mkdir -p "$OUTPUT_DIR"

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.Version=${{ steps.vars.outputs.VERSION }} -X main.Build=${{ steps.vars.outputs.COMMIT }} -extldflags '-static'" \
            -o "$OUTPUT_FILE" .

          upx ${{ env.UPX_ARGS }} "$OUTPUT_FILE" || true

          for FILE in ${{ env.EXTRA_FILES }}; do
            if [[ -f "$FILE" ]]; then
              cp "$FILE" "$OUTPUT_DIR/"
            fi
          done

      - name: Archive package
        run: |
          set -euo pipefail

          VERSION="${{ steps.vars.outputs.VERSION }}"
          VERSION="${VERSION#v}"
          PACKAGE_NAME="${{ env.PROJECT_NAME }}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          PACKAGE_DIR="${{ env.DIST_DIR }}/${PACKAGE_NAME}"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            (cd "$PACKAGE_DIR" && zip -r "../${PACKAGE_NAME}.zip" .)
          else
            tar -czf "${{ env.DIST_DIR }}/${PACKAGE_NAME}.tar.gz" -C "$PACKAGE_DIR" .
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: kctx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.DIST_DIR }}/*.tar.gz
            ${{ env.DIST_DIR }}/*.zip
          if-no-files-found: error
          retention-days: 1

  release:
    name: Upload assets to GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.DIST_DIR }}
          pattern: kctx-*
          merge-multiple: true

      - name: Generate digests
        run: |
          set -euo pipefail
          shasum -a 256 "${{ env.DIST_DIR }}"/*.tar.gz "${{ env.DIST_DIR }}"/*.zip > "${{ env.DIST_DIR }}/digests.txt"

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.DIST_DIR }}/*.tar.gz
            ${{ env.DIST_DIR }}/*.zip
            ${{ env.DIST_DIR }}/digests.txt
