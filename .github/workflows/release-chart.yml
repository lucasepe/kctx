name: release-chart

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  DIST_DIR: dist

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Determine version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Lint chart
        run: helm lint ./chart

      - name: Package chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ env.DIST_DIR }}"
          helm package ./chart \
            --version "${{ steps.vars.outputs.version }}" \
            --app-version "${{ steps.vars.outputs.version }}" \
            --destination "${{ env.DIST_DIR }}"
          shasum -a 256 "${{ env.DIST_DIR }}"/*.tgz > "${{ env.DIST_DIR }}/chart-digests.txt"

      - name: Upload chart to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.DIST_DIR }}/*.tgz
            ${{ env.DIST_DIR }}/chart-digests.txt
