name: release-image

on:
  push:
    tags:
      - "v*.*.*"

env:
  GHCR_REPO: ghcr.io/${{ github.repository }}

jobs:
  prepare:
    name: Prepare image metadata
    runs-on: ubuntu-24.04

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Calcoliamo i tag una sola volta, cosi i job successivi restano allineati.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Ogni job builda in modo nativo la propria architettura e pubblica solo il digest.
      # I tag finali verranno associati tutti insieme nel job "publish".
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.prepare.outputs.labels }}
          build-args: |
            CACHEBUST=${{ github.sha }}
            COMMIT_HASH=${{ github.sha }}
          outputs: type=image,name=${{ env.GHCR_REPO }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      # Salviamo il digest come artifact per comporre poi il manifest multi-arch.
      - name: Export digest
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v6
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-arch image
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Qui assembliamo i digest pubblicati dai job precedenti in un'unica immagine multi-arch.
      - name: Create and push manifest list
        working-directory: /tmp/digests
        shell: bash
        run: |
          set -euo pipefail

          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS+=(-t "$tag")
          done <<'EOF'
          ${{ needs.prepare.outputs.tags }}
          EOF

          DIGEST_ARGS=()
          for digest_file in *; do
            DIGEST_ARGS+=("${{ env.GHCR_REPO }}@sha256:${digest_file}")
          done

          docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGEST_ARGS[@]}"

      # Facoltativo ma utile: mostra in log il risultato finale con entrambe le architetture.
      - name: Inspect published image
        run: docker buildx imagetools inspect ${{ env.GHCR_REPO }}:${{ needs.prepare.outputs.version }}
